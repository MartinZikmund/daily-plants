<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Daily Plants — Two-leaf check, EXTRA BOLD, straight stem -->

  <!-- Soil mound -->
  <g id="soil">
    <ellipse cx="230" cy="460" rx="85" ry="24" fill="#8B6914"/>
    <ellipse cx="225" cy="456" rx="60" ry="14" fill="#A07B1A" opacity="0.5"/>
  </g>

  <!-- Stem from junction nearly straight down to soil -->
  <g id="stem">
    <path d="M225,315 Q228,372 230,430 Q231,445 231,455"
          fill="none" stroke="#2D6A4F" stroke-width="16" stroke-linecap="round"/>
    <!-- Tiny accent leaf on stem -->
    <path d="M228,385
             C214,371 194,363 182,371
             C174,379 182,391 198,395
             C212,397 224,393 228,385Z"
          fill="#95D5B2"/>
    <path d="M228,385 C210,375 196,369 184,373"
          fill="none" stroke="#2D6A4F" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Two leaves forming checkmark — EXTRA BOLD and WIDE -->
  <g id="check-leaves">
    <!-- Short-arm leaf: UP-LEFT from junction, very fat and wide -->
    <path d="M225,315
             C200,280 160,235 120,200
             C92,177 68,167 58,183
             C48,203 62,235 92,265
             C135,300 192,315 225,315Z"
          fill="#52B788"/>
    <!-- Short-arm highlight -->
    <path d="M225,315
             C205,293 178,263 145,233
             C120,213 98,201 82,205
             C88,221 108,243 136,267
             C172,295 210,311 225,315Z"
          fill="#B7E4C7" opacity="0.5"/>
    <!-- Short-arm midrib -->
    <path d="M225,315 C188,279 138,233 78,191"
          fill="none" stroke="#2D6A4F" stroke-width="4.5" stroke-linecap="round" opacity="0.45"/>

    <!-- Long-arm leaf: UP-RIGHT from junction, very large, wide, reaching high -->
    <path d="M225,315
             C255,270 300,205 355,143
             C390,103 428,67 465,45
             C488,32 502,40 498,63
             C492,95 470,135 440,173
             C378,247 298,300 248,330
             C230,339 225,330 225,315Z"
          fill="#52B788"/>
    <!-- Long-arm highlight -->
    <path d="M278,257
             C308,217 352,165 400,115
             C430,85 460,60 482,47
             C478,67 460,95 432,131
             C376,200 308,263 284,283
             C278,277 278,267 278,257Z"
          fill="#B7E4C7" opacity="0.5"/>
    <!-- Long-arm midrib -->
    <path d="M225,315 C272,267 338,191 420,110 Q455,73 485,47"
          fill="none" stroke="#2D6A4F" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
